{% extends "layout.html" %}
{% block content %}
<div class="card predict-card">
    <h2>Enter Your Study Habits</h2>
    <form id="predict-form">
        <div class="form-group">
            <label>Study Hours</label>
            <input type="number" id="study_hours" step="0.1" placeholder="e.g., 3.5" required>
        </div>
        <div class="form-group">
            <label>Break Time (Hours)</label>
            <input type="number" id="break_time" step="0.1" placeholder="e.g., 0.5" required>
        </div>
        <div class="form-group">
            <label>Sleep Hours</label>
            <input type="number" id="sleep_hours" step="0.1" placeholder="e.g., 7.5" required>
        </div>
        <div class="form-group">
            <label>Focus Score (1-10): <span id="focus-val" class="highlight">5</span></label>
            <input type="range" id="focus_score" min="1" max="10" step="0.1" value="5" oninput="document.getElementById('focus-val').innerText = this.value">
        </div>
        <div class="form-group">
            <label>Distraction Level</label>
            <select id="distraction_level" required>
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
        </div>
        <div class="form-group">
            <label>Day of Week</label>
            <select id="day_of_week" required>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
        </div>
        <button type="submit" class="btn btn-full">Predict Study Pattern</button>
    </form>
    
    <div id="result-section" class="result hidden">
        <h3>Best Pattern:</h3>
        <p id="prediction-text"></p>
    </div>
    <div id="error-section" class="error hidden">
        <p id="error-text"></p>
    </div>
</div>
{% endblock %}
