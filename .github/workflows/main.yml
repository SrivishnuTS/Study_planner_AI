name: Advanced ML CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'data/**'
      - 'model/**'
      - '.github/workflows/main.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test:
    name: Unit and Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      JWT_SECRET_KEY: ci-test-secret
      MONGODB_URI: mongodb://localhost:27017/unused-in-ci
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pytest
        run: pytest -v --maxfail=2

  train:
    name: Model Training
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train Model
        run: python train.py --version "${{ github.sha }}"

      - name: Archive Model Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: study-pattern-model-${{ github.sha }}
          path: |
            model/model.pkl
            model/model_metrics.json
            model/reference_stats.json
          retention-days: 7

  validate:
    name: Model Validation
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download Model Artifacts
        uses: actions/download-artifact@v3
        with:
          name: study-pattern-model-${{ github.sha }}
          path: model/

      - name: Validate Model Quality
        run: |
          python -c "
          import json, sys
          with open('model/model_metrics.json') as f:
              metrics = json.load(f)
          acc = metrics.get('accuracy', 0)
          print(f'Model Accuracy: {acc*100:.2f}%')
          if acc < 0.70:
              print('Validation Failed: Accuracy below threshold (70%)')
              sys.exit(1)
          print('Validation Passed!')
          "

  docker:
    name: Docker Build
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t study-pattern-prediction:${{ github.sha }} .
          docker tag study-pattern-prediction:${{ github.sha }} study-pattern-prediction:latest
